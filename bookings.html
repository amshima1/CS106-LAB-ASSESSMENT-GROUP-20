<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onyx—Adire | Bookings</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .booking-wrap {
            max-width: 550px;
            margin: 40px auto;
            padding: 0 20px;
            text-align: left;
        }
        .form-card {
            background: #fff;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-radius: 4px;
        }
        .field { margin-bottom: 20px; }
        .field label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--brand-red);
        }
        input, select, textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #eee;
            background: #fdfdfd;
            font-family: inherit;
        }
        .submit-btn {
            width: 100%;
            background: var(--brand-red);
            color: white;
            border: none;
            padding: 16px;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="menu-icon" onclick="toggleNav()"><div></div><div></div><div></div></div>
            <a href="index.html" class="logo">Onyx—Adire</a>
            <div style="width: 30px;"></div>
        </nav>
    </header>

    <div id="mySidenav">
        <a href="index.html">Home</a>
        <a href="collections.html">Collections</a>
        <a href="trustees.html">Trustees</a>
        <a href="events.html">Events</a>
        <a href="bookings.html">Bookings</a>
    </div>
    <div id="overlay"></div>

    <main style="padding-top: 120px;">
        <section class="debut-header">
            <h1>Private Bookings</h1>
            <p>Request bespoke tailoring or wholesale consultations.</p>
        </section>

        <div class="booking-wrap">
            <div class="form-card">
                <form id="orderForm">
                    <div class="field">
                        <label>Full Name</label>
                        <input type="text" placeholder="e.g. Adeola Benson" required>
                    </div>
                    <div class="field">
                        <label>Interest</label>
                        <select>
                            <option>Bespoke Tailoring</option>
                            <option>Wedding Collection</option>
                            <option>Wholesale/Bulk Order</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Additional Details</label>
                        <textarea rows="4" placeholder="Measurements or event date..."></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Send Inquiry</button>
                </form>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        document.getElementById('orderForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("Inquiry received. We will reach out via WhatsApp shortly.");
        });
    </script>
</body>
</html>
