<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onyx—Adire | Bookings</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .booking-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: left;
        }

        .booking-form {
            background: white;
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--brand-red);
        }

        .form-group input, 
        .form-group select, 
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 2px;
            font-family: inherit;
            font-size: 14px;
            box-sizing: border-box; /* Ensures padding doesn't break width */
        }

        .form-group textarea {
            height: 120px;
            resize: vertical;
        }

        .submit-booking {
            width: 100%;
            background: var(--brand-red);
            color: white;
            border: none;
            padding: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-booking:hover {
            background: #6b1515;
        }

        .booking-note {
            margin-top: 20px;
            font-size: 13px;
            text-align: center;
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>

    <header>
        <div class="announcement-bar">
            <span class="announcement-text">✦ THE ONYX—ADIRE EXPERIENCE ✦ WORLDWIDE SHIPPING AVAILABLE ✦ NEW DROP COMING SOON ✦</span>
        </div>
        <nav>
            <div class="menu-icon" onclick="toggleNav()">
                <div></div><div></div><div></div>
            </div>
            <a href="index.html" class="logo">Onyx—Adire</a>
            <div style="width: 30px;"></div>
        </nav>
    </header>

    <div id="mySidenav">
        <a href="index.html">Home</a>
        <a href="collections.html">Collections</a>
        <a href="trustees.html">Trustees</a>
        <a href="events.html">Events</a>
        <a href="bookings.html">Bookings</a>
    </div>
    <div id="overlay"></div>

    <main>
        <section class="debut-header">
            <h1>Private Bookings</h1>
        </section>

        <div class="booking-container">
            <form class="booking-form" id="bookingForm">
                <div class="form-group">
                    <label for="full-name">Full Name</label>
                    <input type="text" id="full-name" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="email@example.com" required>
                </div>

                <div class="form-group">
                    <label for="service">Service Required</label>
                    <select id="service" required>
                        <option value="">Select a service</option>
                        <option value="Bespoke Tailoring">Bespoke Tailoring</option>
                        <option value="Wedding Consultation">Wedding Consultation</option>
                        <option value="Bulk Order">Bulk/Wholesale Inquiry</option>
                        <option value="Event Appearance">Event Appearance</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Your Requirements</label>
                    <textarea id="message" placeholder="Tell us about your style preference, measurements, or event date..."></textarea>
                </div>

                <button type="submit" class="submit-booking">Send Inquiry</button>
                <p class="booking-note">A member of our team will contact you within 24 hours.</p>
            </form>
        </div>

        <section class="footer-cta">
            <h2>Subscribe to our newsletter</h2>
            <div class="subscribe-container">
                <input type="email" class="email-input" placeholder="Enter your email">
                <button class="subscribe-btn">Join the Movement</button>
            </div>
            <span class="social-handle">@Onyx_Adire</span>
        </section>
    </main>

    <a href="https://wa.me/234XXXXXXXXXX" class="whatsapp-link" target="_blank">💬 Chat Via Whatsapp</a>

    <script src="script.js"></script>
    <script>
        // Specific logic for the booking form
        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('full-name').value;
            alert(`Thank you, ${name}! Your inquiry has been sent to Onyx—Adire.`);
            this.reset();
        });
    </script>
</body>
</html>
