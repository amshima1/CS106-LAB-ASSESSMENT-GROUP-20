<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiries | Onyx—Adire</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --onyx-red: #cc0000; }
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; font-family: 'Inter', sans-serif; 
            background: #fff; overflow-x: hidden; 
            display: flex; flex-direction: column; min-height: 100vh; 
        }

        /* STRICT RED TEXT ENFORCEMENT */
        h1, h2, h3, h4, h5, h6, p, a, span, i, marquee, label, input, textarea { 
            color: var(--onyx-red) !important; 
        }

        /* 1. ANNOUNCEMENT BAR */
        .announcement-bar {
            background: var(--onyx-red);
            height: 35px; width: 100%; position: fixed; top: 0; z-index: 10010;
            display: flex; align-items: center;
        }
        .announcement-bar marquee { 
            color: #ffffff !important; 
            font-size: 0.7rem; font-weight: 800; letter-spacing: 2.5px; text-transform: uppercase; 
        }

        /* 2. MAIN HEADER */
        .main-header { 
            position: fixed; top: 35px; width: 100%; height: 80px;
            background: rgba(255, 255, 255, 0.98); border-bottom: 1px solid #f0f0f0; z-index: 1000;
            display: flex; justify-content: center; align-items: center;
        }
        .brand-logo { font-family: 'Cinzel', serif; font-size: 1.5rem; letter-spacing: 5px; text-decoration: none; }

        /* 3. HAMBURGER ICON */
        .hamburger {
            position: absolute; left: 25px; width: 28px; height: 18px;
            display: flex; flex-direction: column; justify-content: space-between;
            cursor: pointer; z-index: 10002;
        }
        .hamburger span { display: block; height: 2px; width: 100%; background: var(--onyx-red); }

        /* 4. 30% SIDE NAVIGATION */
        .side-nav {
            position: fixed; 
            top: 35px; 
            left: -30%; 
            width: 30%; 
            height: calc(100vh - 35px); 
            background: #ffffff; 
            z-index: 9999; 
            transition: 0.6s cubic-bezier(0.77, 0, 0.175, 1);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border-right: 1px solid #f0f0f0;
            box-shadow: 15px 0 40px rgba(0, 0, 0, 0.05);
        }
        .side-nav.open { left: 0; }

        /* RED "X" AT INTERIOR EDGE */
        .close-menu {
            position: absolute; top: 25px; right: 25px;
            font-size: 2.8rem; cursor: pointer; line-height: 1; font-weight: 300;
            color: var(--onyx-red) !important;
        }

        /* VERTICAL STRAIGHT LINE LINKS */
        .nav-links { display: flex; flex-direction: column; gap: 40px; text-align: center; }
        .nav-links a { 
            font-family: 'Cinzel', serif; font-size: 1.4rem; text-decoration: none; 
            font-weight: 700; text-transform: uppercase; 
        }

        /* 5. INQUIRY CONTENT */
        .content { 
            flex: 1; padding: 180px 20px 120px; 
            max-width: 800px; margin: 0 auto; text-align: center; 
        }
        
        .contact-header { margin-bottom: 60px; }
        .contact-header h2 { font-family: 'Cinzel', serif; font-size: 2.8rem; margin-bottom: 10px; }
        .contact-header p { font-size: 0.8rem; letter-spacing: 4px; font-weight: 700; text-transform: uppercase; }

        /* FORM STYLING */
        .form-container { text-align: left; }
        .form-group { margin-bottom: 40px; }
        
        label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 10px; }
        
        input, textarea {
            width: 100%; padding: 15px 0; background: transparent; border: none;
            border-bottom: 1px solid rgba(204, 0, 0, 0.2); 
            font-family: 'Inter', sans-serif; font-size: 1rem; outline: none; 
            transition: border-color 0.4s ease;
        }
        input:focus, textarea:focus { border-bottom: 1px solid var(--onyx-red); }

        .submit-btn {
            background: var(--onyx-red); color: #fff !important; border: none;
            padding: 22px; width: 100%; cursor: pointer;
            font-family: 'Inter', sans-serif; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 5px; font-size: 0.85rem;
            margin-top: 20px; transition: 0.4s ease;
        }
        .submit-btn:hover { background: #990000; letter-spacing: 7px; }

        /* 6. RED FOOTER */
        .main-footer {
            background: var(--onyx-red);
            padding: 80px 20px; text-align: center; width: 100%; margin-top: auto;
        }
        .main-footer p { 
            color: #ffffff !important; 
            font-size: 0.75rem; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; margin: 0; 
        }

        /* 7. WHATSAPP FLOAT */
        .whatsapp-float {
            position: fixed; bottom: 120px; right: 30px;
            background: #fff; border: 2px solid var(--onyx-red);
            padding: 12px 25px; border-radius: 50px; text-decoration: none;
            font-weight: 800; font-size: 0.75rem; z-index: 10010;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 10px 30px rgba(204, 0, 0, 0.1);
        }

        @media (max-width: 1024px) {
            .side-nav { width: 85%; left: -85%; }
            .content { padding-top: 140px; }
            .contact-header h2 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div class="announcement-bar">
        <marquee scrollamount="6">ONYX—ADIRE X MIVA OPEN UNIVERSITY: ARCHIVING THE FUTURE OF AFRICAN TEXTILES.</marquee>
    </div>

    <nav class="side-nav" id="side-menu">
        <div class="close-menu" id="nav-close">&times;</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="collection.html">Collection</a>
            <a href="trustees.html">Trustees</a>
            <a href="events.html">Events</a>
            <a href="inquiries.html">Inquiries</a>
        </div>
    </nav>

    <header class="main-header">
        <div class="hamburger" id="nav-toggle">
            <span></span><span></span><span></span>
        </div>
        <a href="index.html" class="brand-logo">ONYX—ADIRE</a>
    </header>

    <main class="content">
        <div class="contact-header">
            <h2>Formal Inquiry</h2>
            <p>Connect with the archive</p>
        </div>

        <div class="form-container">
            <form action="#">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Entry name" required>
                </div>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="archive@onyx-adire.com" required>
                </div>

                <div class="form-group">
                    <label>Nature of Inquiry</label>
                    <input type="text" placeholder="Collection, Press, or Partnership">
                </div>

                <div class="form-group">
                    <label>Message</label>
                    <textarea rows="4" placeholder="Briefly describe your interest..."></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Inquiry</button>
            </form>
        </div>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 ONYX—ADIRE. ALL RIGHTS RESERVED.</p>
    </footer>

    <a href="https://wa.me/234XXXXXXXXXX" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
        <span>CHAT WITH ONYX</span>
    </a>

    <script>
        const navToggle = document.getElementById('nav-toggle');
        const navClose = document.getElementById('nav-close');
        const sideMenu = document.getElementById('side-menu');

        navToggle.addEventListener('click', () => { sideMenu.classList.add('open'); });
        navClose.addEventListener('click', () => { sideMenu.classList.remove('open'); });
        
        // Close menu on link click
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => { sideMenu.classList.remove('open'); });
        });
    </script>
</body>
</html>
