<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archive | Onyx—Adire</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* Force Universal Red Text */
        :root { --onyx-red: #cc0000; }
        * { color: #cc0000 !important; }

        .announcement-bar marquee { color: #cc0000 !important; }
        .nav-links a, #nav-close { color: #cc0000 !important; }
        .product-info h3, .product-info p { color: #cc0000 !important; }
        .suggestion-item p, .suggestion-title { color: #cc0000 !important; }
        
        /* ADJUSTED FOOTER: White background so red text is visible */
        .footer-red { 
            background: #ffffff !important; 
            border-top: 1px solid #eee;
        }
        .footer-red p { color: #cc0000 !important; font-weight: 700; }

        .whatsapp-btn, .whatsapp-btn i { color: #cc0000 !important; }
        .collection-subtitle { color: #cc0000 !important; opacity: 1; }

        /* Horizontal Scroll Styling */
        .horizontal-scroll { 
            display: flex; 
            overflow-x: auto; 
            gap: 15px; 
            padding: 20px; 
            scrollbar-width: none; 
        }
        .horizontal-scroll::-webkit-scrollbar { display: none; }
        .horizontal-scroll .grid-item { min-width: 140px; }
    </style>
</head>
<body>

    <div class="announcement-bar">
        <marquee scrollamount="5">EXPLORE THE FULL ONYX—ADIRE ARCHIVE. TRADITION IN EVERY THREAD.</marquee>
    </div>

    <header class="main-header">
        <div class="header-inner">
            <div class="hamburger" id="nav-open">
                <span></span><span></span><span></span>
            </div>
            <h1 class="brand-logo">ONYX—ADIRE</h1>
            <div class="header-spacer"></div>
        </div>
    </header>

    <nav id="side-menu" class="side-nav">
        <span id="nav-close">&times;</span>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="collection.html">Collection</a>
            <a href="trustees.html">Trustees</a>
            <a href="events.html">Events</a>
            <a href="contact.html">Inquiries</a>
        </div>
    </nav>

    <div id="lightbox" class="lightbox">
        <span class="close-lightbox">&times;</span>
        <div class="lightbox-main-content">
            <img class="lightbox-img" src="" alt="Onyx Gallery">
            <div class="lightbox-caption"></div>
        </div>
        <div class="suggestions-container">
            <h4 class="suggestion-title">YOU MAY ALSO LIKE</h4>
            <div id="suggestion-row" class="suggestion-grid"></div>
        </div>
    </div>

    <main class="main-content">
        <header class="collection-header">
            <h2 class="section-title">THE FULL ARCHIVE</h2>
            <p class="collection-subtitle">47 UNIQUE PIECES OF ARTISAN CRAFT</p>
        </header>

        <section class="collection-area">
            <div class="grid-container" id="main-grid"></div>
        </section>

        <section class="extra-section" id="recent-section" style="display:none;">
            <h2 class="section-title">RECENTLY VIEWED</h2>
            <div class="horizontal-scroll" id="recent-view-container"></div>
        </section>
    </main>

    <footer class="footer-red">
        <p>&copy; 2026 ONYX—ADIRE. ALL RIGHTS RESERVED.</p>
    </footer>

    <a href="https://wa.me/234XXXXXXXXXX" class="whatsapp-btn">
        <i class="fab fa-whatsapp"></i> Order This Piece
    </a>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('main-grid');
            if (grid) {
                let items = '';
                for (let i = 1; i <= 47; i++) {
                    items += `
                        <div class="grid-item">
                            <img src="Onyx-Adire${i}.jpg" class="clickable-img" data-name="Onyx ${i}" loading="lazy">
                            <div class="product-info">
                                <h3>Onyx ${i}</h3>
                                <p>₦25,000</p>
                            </div>
                        </div>`;
                }
                grid.innerHTML = items;
            }
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
