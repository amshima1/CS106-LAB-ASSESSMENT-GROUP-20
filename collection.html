<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archive | Onyx—Adire</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --onyx-red: #cc0000; }
        body, h1, h2, h3, h4, p, a { color: var(--onyx-red); }
        
        /* Permanent Visible State with Pulse */
        .whatsapp-btn { 
            opacity: 1 !important; 
            transform: translateY(0) !important; 
            pointer-events: auto !important; 
            display: flex;
            align-items: center;
            gap: 8px;
            animation: pulse-ring 2s infinite;
            z-index: 10001;
        }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(204, 0, 0, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(204, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(204, 0, 0, 0); }
        }

        .footer-red { background: var(--onyx-red) !important; padding: 60px 20px; text-align: center; }
        .footer-red p { color: #ffffff !important; }
    </style>
</head>
<body>
    <div class="announcement-bar">
        <marquee scrollamount="5">EXPLORE THE FULL ONYX—ADIRE ARCHIVE.</marquee>
    </div>

    <main class="main-content">
        <header class="collection-header" style="text-align: center; padding: 60px 20px 20px;">
            <h2 class="section-title">THE FULL ARCHIVE</h2>
            <p style="font-size: 0.6rem; letter-spacing: 3px; font-weight: 800;">47 UNIQUE PIECES</p>
        </header>

        <section class="collection-area">
            <div class="grid-container" id="main-grid"></div>
        </section>

        <section class="extra-section" id="recent-section" style="display:none;">
            <h2 class="section-title">RECENTLY VIEWED</h2>
            <div class="horizontal-scroll" id="recent-view-container"></div>
        </section>
    </main>

    <footer class="footer-red">
        <p>&copy; 2026 ONYX—ADIRE. ALL RIGHTS RESERVED.</p>
    </footer>

    <a href="https://wa.me/234XXXXXXXXXX?text=Hello%20Onyx-Adire!" class="whatsapp-btn">
        <i class="fab fa-whatsapp"></i> Chat with Onyx
    </a>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('main-grid');
            if (grid) {
                let items = '';
                for (let i = 1; i <= 47; i++) {
                    items += `<div class="grid-item">
                        <img src="Onyx-Adire${i}.jpg" class="clickable-img" data-name="Onyx ${i}" onclick="openLightbox('Onyx-Adire${i}.jpg', 'Onyx ${i}')" loading="lazy">
                        <div class="product-info"><h3>Onyx ${i}</h3><p>₦25,000</p></div>
                    </div>`;
                }
                grid.innerHTML = items;
            }
        });
    </script>
</body>
</html>
