<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archive | Onyx—Adire</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --onyx-red: #cc0000; }
        body, h1, h2, h3, h4, p, a, span { color: var(--onyx-red) !important; }
        .footer-red { background: var(--onyx-red) !important; padding: 60px 20px; text-align: center; }
        .footer-red p { color: #fff !important; }
        .whatsapp-btn { 
            display: flex !important; opacity: 1 !important; z-index: 10001; 
            position: fixed; bottom: 25px; right: 20px; background: #fff;
            padding: 12px 24px; border-radius: 50px; text-decoration: none;
            border: 2px solid var(--onyx-red); font-weight: 800; font-size: 0.8rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); align-items: center; gap: 8px;
            animation: pulse-ring 2s infinite;
        }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(204, 0, 0, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(204, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(204, 0, 0, 0); }
        }
    </style>
</head>
<body>
    <div class="announcement-bar"><marquee>EXPLORE THE FULL ONYX—ADIRE ARCHIVE.</marquee></div>

    <header class="main-header">
        <div class="header-inner">
            <div class="hamburger" id="nav-open"><span></span><span></span><span></span></div>
            <h1 class="brand-logo">ONYX—ADIRE</h1>
        </div>
    </header>

    <nav id="side-menu" class="side-nav">
        <span id="nav-close">&times;</span>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="collection.html">Collection</a>
            <a href="trustees.html">Trustees</a>
            <a href="events.html">Events</a>
            <a href="contact.html">Inquiries</a>
        </div>
    </nav>

    <div id="lightbox" class="lightbox">
        <span class="close-lightbox">&times;</span>
        <div class="lightbox-main-content">
            <img class="lightbox-img" src="">
            <div class="lightbox-caption"></div>
        </div>
    </div>

    <main class="main-content">
        <header style="text-align:center; padding: 60px 20px 20px;">
            <h2 class="section-title">THE FULL ARCHIVE</h2>
            <p style="font-size: 0.6rem; letter-spacing: 3px; font-weight: 800;">47 UNIQUE PIECES</p>
        </header>
        <section class="collection-area"><div class="grid-container" id="main-grid"></div></section>
    </main>

    <footer class="footer-red"><p>&copy; 2026 ONYX—ADIRE. ALL RIGHTS RESERVED.</p></footer>
    <a href="https://wa.me/234XXXXXXXXXX" class="whatsapp-btn"><i class="fab fa-whatsapp"></i> Chat with Onyx</a>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('main-grid');
            let items = '';
            for (let i = 1; i <= 47; i++) {
                items += `<div class="grid-item"><img src="Onyx-Adire${i}.jpg" class="clickable-img" data-name="Onyx ${i}" loading="lazy"><div class="product-info"><h3>Onyx ${i}</h3><p>₦25,000</p></div></div>`;
            }
            grid.innerHTML = items;

            document.addEventListener('click', (e) => {
                if (e.target.classList.contains('clickable-img')) {
                    document.getElementById('lightbox').style.display = 'flex';
                    document.querySelector('.lightbox-img').src = e.target.src;
                    document.querySelector('.lightbox-caption').innerText = e.target.getAttribute('data-name');
                }
                if (e.target.classList.contains('close-lightbox')) {
                    document.getElementById('lightbox').style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
