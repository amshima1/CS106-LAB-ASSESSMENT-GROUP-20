<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Collection | Onyx—Adire</title>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: #fffcf9; color: #333; overflow-x: hidden; }
        
        /* Navigation (Standardized Across Site) */
        nav { display: flex; align-items: center; justify-content: center; padding: 25px; border-bottom: 1px solid #f4f4f4; position: relative; background: #fffcf9; z-index: 1000; }
        .menu-icon { position: absolute; left: 20px; font-size: 28px; cursor: pointer; color: #800020; }
        .logo { text-decoration: none; color: #800020; font-family: 'Playfair Display', serif; font-size: 26px; font-style: italic; }

        /* Left-Aligned Menu Overlay (30-35% Height) */
        .menu-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 33vh; 
            background: #fffcf9; z-index: 1000000; flex-direction: column; padding: 30px 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.03); animation: slideDown 0.35s ease-out; box-sizing: border-box;
        }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
        .menu-tint { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 999999; }
        .menu-overlay a { margin: 8px 0; font-size: 13px; text-decoration: none; color: #800020; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 500; text-align: left; }

        /* Product Grid Style */
        .section-title { font-family: 'Playfair Display', serif; text-align: center; font-style: italic; margin: 40px 0 20px; color: #800020; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 15px 40px; max-width: 1200px; margin: 0 auto; }
        
        .card { background: #fff; cursor: pointer; transition: transform 0.3s ease; }
        .card img { width: 100%; height: 350px; object-fit: cover; }
        .card:hover { transform: translateY(-5px); }
        .meta { padding: 10px; text-align: left; }
        .meta h4 { font-family: 'Playfair Display', serif; font-size: 14px; margin: 0; font-style: italic; color: #800020; }
        .meta p { font-size: 12px; font-weight: bold; margin: 5px 0; }

        /* IMAGE EXPAND MODAL */
        #imageModal {
            display: none; position: fixed; z-index: 2000000; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98); justify-content: center; align-items: center; flex-direction: column;
        }
        #modalImg { max-width: 90%; max-height: 70vh; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .close-expand { position: absolute; top: 20px; right: 30px; font-size: 40px; cursor: pointer; color: #800020; }
        .view-btn { margin-top: 30px; background: #000; color: #fff; padding: 15px 40px; text-decoration: none; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }

        /* Floatin WhatsApp Link */
        .whatsapp-sticky { 
            position: fixed !important; bottom: 25px !important; right: 20px !important; 
            background-color: #e85d43 !important; color: white !important; 
            text-decoration: none !important; border-radius: 50px !important; 
            padding: 12px 20px !important; display: flex !important; align-items: center !important; 
            z-index: 9999; font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(4, 1fr); }
            .card img { height: 450px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="menu-icon" onclick="toggleMenu()">&#9776;</div>
        <a href="index.html" class="logo">Onyx—Adire</a>
        <div id="menuTint" class="menu-tint" onclick="toggleMenu()"></div>
        <div id="mobileMenu" class="menu-overlay">
            <a href="index.html">The Home</a>
            <a href="products.html" style="font-weight: bold;">The Collection</a>
            <a href="visionaries.html">The Visionaries</a>
            <a href="runway.html">The Runway</a>
            <a href="bookings.html">The Atelier</a>
        </div>
    </nav>

    <h3 class="section-title">The Debut Edit</h3>
    <div class="grid" id="main-grid"></div>

    <div id="recent-view-section" style="display:none;">
        <h3 class="section-title">Recently Viewed</h3>
        <div class="grid" id="recent-grid"></div>
    </div>

    <h3 class="section-title">You May Also Like</h3>
    <div class="grid" id="discovery-grid"></div>

    <div id="imageModal">
        <span class="close-expand" onclick="closeExpand()">&times;</span>
        <img id="modalImg" src="">
        <a href="#" id="modalLink" class="view-btn">VIEW FULL DETAILS</a>
    </div>

    <a href="https://wa.me/2347077978711" class="whatsapp-sticky" target="_blank">💬 Chat Via Whatsapp</a>

    <script>
        // 1. Define all available products in your repository
        // FILENAMES MUST MATCH WHAT YOU UPLOADED (e.g., galaxy-print-jumpsuit.jpg)
        const productRepository = [
            { name: "Galaxy Print Jumpsuit", price: "₦58,500.00", img: "galaxy-print-jumpsuit.jpg" },
            { name: "Bespoke Agbada", price: "₦95,000.00", img: "bespoke-traditional-agbada.jpg" },
            { name: "Adire Silk Tunic", price: "₦45,000.00", img: "adire-silk-tunic.jpg" },
            { name: "Floral Adire Kaftan", price: "₦52,000.00", img: "floral-adire-kaftan.jpg" },
            { name: "Ebony Silk Boubou", price: "₦65,000.00", img: "ebony-silk-boubou.jpg" },
            { name: "Asymmetric Tunic", price: "₦42,000.00", img: "asymmetric-adire-tunic.jpg" },
            { name: "Bespoke Caftan", price: "₦75,000.00", img: "bespoke-velvet-caftan.jpg" },
            { name: "Monochrome Pattern Set", price: "₦60,000.00", img: "monochrome-pattern-set.jpg" }
        ];

        // 2. Logic for rendering product cards
        function createProductCard(item) {
            return `
                <div class="card" onclick="openPreview('${item.img}', '${encodeURIComponent(item.name)}', '${encodeURIComponent(item.price)}')">
                    <img src="${item.img}">
                    <div class="meta">
                        <h4>${item.name}</h4>
                        <p>${item.price}</p>
                    </div>
                </div>`;
        }

        // 3. Logic for handling user interactions
        function openPreview(img, name, price) {
            // Store Recently Viewed (Last 4 items)
            let recent = JSON.parse(localStorage.getItem('onyx_recent')) || [];
            recent = recent.filter(i => i.img !== img); // Remove duplicates
            recent.unshift({name: decodeURIComponent(name), price: decodeURIComponent(price), img: img}); // Add new item to start
            localStorage.setItem('onyx_recent', JSON.stringify(recent.slice(0, 4))); // Save top 4
            
            // Populate Modal
            document.getElementById('modalImg').src = img;
            document.getElementById('modalLink').href = `product-detail.html?name=${name}&price=${price}&img=${img}`;
            document.getElementById('imageModal').style.display = 'flex';
            
            renderRecentlyViewed();
        }

        function closeExpand() { document.getElementById('imageModal').style.display = 'none'; }

        function toggleMenu() {
            const m = document.getElementById("mobileMenu");
            const t = document.getElementById("menuTint");
            const isOpen = m.style.display === "flex";
            m.style.display = isOpen ? "none" : "flex";
            t.style.display = isOpen ? "none" : "block";
        }

        // 4. Logic for rendering specific sections
        function renderRecentlyViewed() {
            const recent = JSON.parse(localStorage.getItem('onyx_recent')) || [];
            const container = document.getElementById('recent-grid');
            if (recent.length > 0) {
                document.getElementById('recent-view-section').style.display = 'block';
                container.innerHTML = recent.map(item => createProductCard(item)).join('');
            }
        }

        window.onload = function() {
            // Render 8 items in the core collection grid
            const mainGrid = document.getElementById('main-grid');
            mainGrid.innerHTML = productRepository.map(item => createProductCard(item)).join('');

            // Render 4 random items in the Discovery (You May Also Like) grid
            const discoveryGrid = document.getElementById('discovery-grid');
            const shuffled = [...productRepository].sort(() => 0.5 - Math.random()).slice(0, 4);
            discoveryGrid.innerHTML = shuffled.map(item => createProductCard(item)).join('');

            // Initial load of recently viewed items
            renderRecentlyViewed();
        };
    </script>
</body>
</html>
