<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Collection | Onyx—Adire</title>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: #fffcf9; color: #333; overflow-x: hidden; }
        
        /* Navigation Bar */
        nav { display: flex; align-items: center; justify-content: center; padding: 25px; border-bottom: 1px solid #f4f4f4; position: relative; background: #fffcf9; z-index: 1000; }
        .menu-icon { position: absolute; left: 20px; font-size: 28px; cursor: pointer; color: #800020; }
        .logo { text-decoration: none; color: #800020; font-family: 'Playfair Display', serif; font-size: 26px; font-style: italic; }

        /* FIXED: Top-Side Menu Overlay (30-35% Height) */
        .menu-overlay { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 33vh; /* Covers exactly 33% of the viewport height */
            background: #fffcf9; 
            z-index: 1000000; 
            flex-direction: column; 
            padding: 30px 20px; /* Padding for left-side alignment */
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            animation: slideDown 0.35s ease-out;
            box-sizing: border-box;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }

        /* Full Background Tint */
        .menu-tint {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); z-index: 999999;
        }

        /* FIXED: Left-Aligned Menu Items - Matches Cite 14530.jpg */
        .menu-overlay a { 
            margin: 8px 0; 
            font-size: 13px; 
            text-decoration: none; 
            color: #800020; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            font-weight: 500; 
            text-align: left; /* Aligns write-up to the left */
        }

        /* Product Grid */
        .section-title { font-family: 'Playfair Display', serif; text-align: center; font-style: italic; margin: 40px 0 20px; color: #800020; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 15px 40px; max-width: 1200px; margin: 0 auto; }
        .card { background: #fff; cursor: pointer; }
        .card img { width: 100%; height: 350px; object-fit: cover; }
        .meta { padding: 10px; text-align: left; }
        .meta h4 { font-family: 'Playfair Display', serif; font-size: 14px; margin: 0; font-style: italic; }
        .meta p { font-size: 12px; font-weight: bold; margin: 5px 0; }

        /* Expand View Modal */
        #imageModal {
            display: none; position: fixed; z-index: 2000000; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98); justify-content: center; align-items: center; flex-direction: column;
        }
        #modalImg { max-width: 90%; max-height: 70vh; }
        .close-modal { position: absolute; top: 20px; right: 30px; font-size: 40px; cursor: pointer; color: #800020; }
        .view-btn { margin-top: 30px; background: #000; color: #fff; padding: 15px 40px; text-decoration: none; font-size: 11px; letter-spacing: 2px; }

        /* WhatsApp Button */
        .whatsapp-sticky { 
            position: fixed; bottom: 25px; right: 20px; background-color: #e85d43; color: white; 
            text-decoration: none; border-radius: 50px; padding: 12px 22px; display: flex; align-items: center; 
            z-index: 9999; font-size: 13px;
        }

        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(4, 1fr); }
            .card img { height: 450px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="menu-icon" onclick="toggleMenu()">&#9776;</div>
        <a href="index.html" class="logo">Onyx—Adire</a>
        <div id="menuTint" class="menu-tint" onclick="toggleMenu()"></div>
