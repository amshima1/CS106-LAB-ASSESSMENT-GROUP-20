<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Onyx—Adire</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific styling for the detail page to ensure perfect alignment */
        .detail-main {
            display: flex;
            flex-direction: column;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .featured-image-container {
            width: 100%;
            background-color: #f9f9f9;
            margin-bottom: 20px;
        }
        #main-img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }
        .detail-info {
            padding: 10px;
        }
        .product-title {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.8rem;
            margin-bottom: 10px;
            text-transform: capitalize;
        }
        .product-price {
            font-weight: 600;
            font-size: 1.2rem;
            margin-bottom: 25px;
        }
        .selector-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: block;
            margin-bottom: 8px;
        }
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #000;
            margin-bottom: 20px;
            font-family: inherit;
        }
        .btn-buy-now {
            background: #000;
            color: #fff;
            width: 100%;
            padding: 18px;
            border: none;
            letter-spacing: 2px;
            font-size: 0.8rem;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .btn-whatsapp {
            display: block;
            text-align: center;
            border: 1px solid #000;
            color: #000;
            padding: 15px;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        @media (min-width: 768px) {
            .detail-main { flex-direction: row; gap: 50px; padding: 60px 20px; }
            .featured-image-container { width: 55%; }
            .detail-info { width: 40%; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">Onyx—Adire</a>
            <div class="nav-links">
                <a href="index.html">THE HOME</a>
                <a href="products.html">THE COLLECTION</a>
            </div>
        </div>
    </nav>

    <main>
        <div class="detail-main">
            <div class="featured-image-container">
                <img src="" id="main-img" alt="Loading Product...">
            </div>

            <div class="detail-info">
                <h1 id="p-name" class="product-title">Loading...</h1>
                <p id="p-price" class="product-price">₦0.00 NGN</p>
                
                <div class="purchase-area">
                    <span class="selector-label">Size</span>
                    <select id="size-dropdown">
                        <option>8</option>
                        <option>10</option>
                        <option>12</option>
                        <option>14</option>
                        <option>16</option>
                    </select>

                    <button class="btn-buy-now">BUY IT NOW</button>
                    <a href="#" id="wa-order-link" class="btn-whatsapp">ORDER VIA WHATSAPP</a>
                </div>

                <div style="margin-top: 40px; border-top: 1px solid #eee; padding-top: 20px;">
                    <span class="selector-label">Description</span>
                    <p id="p-desc" style="font-size: 0.9rem; line-height: 1.6; color: #444; margin-top: 10px;">
                        A masterpiece from the Onyx—Adire collection, handcrafted with premium heritage textiles.
                    </p>
                </div>
            </div>
        </div>

        <section class="recommendations" style="padding: 40px 20px;">
            <h2 class="edit-title centralized" style="margin-bottom: 30px;">You May Also Like</h2>
            <div class="product-grid">
                <div class="product-card">
                    <img src="floral-adire-kaftan.jpg">
                    <div class="product-meta"><h4>Floral Kaftan</h4><p>₦52,000.00</p></div>
                </div>
                <div class="product-card">
                    <img src="galaxy-print-jumpsuit.jpg">
                    <div class="product-meta"><h4>Galaxy Jumpsuit</h4><p>₦58,500.00</p></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // 1. Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        
        // 2. Extract and Decode (removes the + signs and special codes)
        const name = urlParams.get('name');
        const price = urlParams.get('price');
        const img = urlParams.get('img');

        if (name && price && img) {
            // Fill the page data
            document.getElementById('p-name').innerText = decodeURIComponent(name.replace(/\+/g, ' '));
            document.getElementById('p-price').innerText = decodeURIComponent(price.replace(/\+/g, ' '));
            document.getElementById('main-img').src = img;

            // 3. Update WhatsApp Link with specific details
            const myNumber = "234XXXXXXXXXX"; // REPLACED WITH YOUR REAL NUMBER
            const cleanName = decodeURIComponent(name.replace(/\+/g, ' '));
            const message = `Hello Onyx-Adire, I'm interested in the ${cleanName} (${price}). Is it available?`;
            document.getElementById('wa-order-link').href = `https://wa.me/${myNumber}?text=${encodeURIComponent(message)}`;
            
            // 4. Update Description based on name
            if (name.includes("Uwata")) {
                document.getElementById('p-desc').innerText = "The Uwata Set is a tribute to heritage, featuring hand-dyed silk designed to command grace and attention.";
            }
        }
    </script>
</body>
</html>
