<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Onyx—Adire</title>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: #fff; color: #333; }
        
        /* Navigation & Centered Menu */
        nav { display: flex; align-items: center; justify-content: center; padding: 20px; border-bottom: 1px solid #f4f4f4; position: relative; background: #fff; }
        .menu-icon { position: absolute; left: 20px; font-size: 28px; cursor: pointer; color: #800020; }
        .logo { text-decoration: none; color: #800020; font-family: 'Playfair Display', serif; font-size: 24px; font-style: italic; }

        .menu-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 1000000; flex-direction: column;
            justify-content: center; align-items: center; 
        }
        .menu-overlay a { margin: 15px 0; font-size: 18px; text-decoration: none; color: #333; text-transform: uppercase; letter-spacing: 3px; }

        /* Main Layout */
        .detail-container { display: flex; flex-direction: column; padding: 20px; max-width: 1200px; margin: 0 auto; gap: 40px; }
        #main-img { width: 100%; height: auto; object-fit: cover; background: #f9f9f9; }
        .product-name { font-family: 'Playfair Display', serif; font-style: italic; font-size: 2rem; color: #800020; margin: 0; }

        /* Recently Viewed Section */
        .recent-section { padding: 40px 20px; background: #fafafa; border-top: 1px solid #eee; margin-top: 50px; }
        .recent-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .recent-card { text-decoration: none; color: inherit; text-align: center; font-size: 11px; }
        .recent-card img { width: 100%; height: 150px; object-fit: cover; margin-bottom: 5px; }

        /* Orange WhatsApp */
        .whatsapp-sticky { 
            position: fixed !important; bottom: 25px !important; right: 20px !important; 
            background-color: #e85d43 !important; color: white !important; 
            text-decoration: none !important; border-radius: 50px !important; 
            padding: 12px 20px !important; display: flex !important; 
            align-items: center !important; z-index: 9999; font-size: 14px;
        }

        @media (min-width: 768px) {
            .detail-container { flex-direction: row; padding: 60px 20px; }
            .recent-grid { grid-template-columns: repeat(5, 1fr); }
        }
    </style>
</head>
<body>

    <nav>
        <div class="menu-icon" onclick="toggleMenu()">&#9776;</div>
        <a href="index.html" class="logo">Onyx—Adire</a>
        <div id="mobileMenu" class="menu-overlay">
            <span onclick="toggleMenu()" style="position: absolute; right: 25px; top: 20px; font-size: 35px; cursor: pointer;">&times;</span>
            <a href="index.html">The Home</a>
            <a href="products.html">The Collection</a>
            <a href="bookings.html">The Atelier</a>
        </div>
    </nav>

    <div class="detail-container">
        <div style="flex: 1;"><img src="" id="main-img"></div>
        <div style="flex: 1;">
            <h1 id="p-name" class="product-name">Loading...</h1>
            <p id="p-price" style="font-weight: bold; font-size: 1.2rem;">₦0.00</p>
            <button style="width:100%; padding:15px; background:#000; color:#fff; border:none; letter-spacing:2px; cursor:pointer;">ADD TO BAG</button>
            <p style="font-size: 0.9rem; color: #666; margin-top: 20px; line-height: 1.6;">Authentic Adire heritage, hand-crafted for the modern visionary.</p>
        </div>
    </div>

    <section id="recent-viewed-section" class="recent-section" style="display: none;">
        <h3 style="text-align: center; font-family: 'Playfair Display', serif; font-style: italic;">Recently Viewed</h3>
        <div id="recent-grid" class="recent-grid"></div>
    </section>

    <a href="https://wa.me/2347077978711" id="wa-btn" class="whatsapp-sticky" target="_blank">💬 Chat Via Whatsapp</a>

    <script>
        const params = new URLSearchParams(window.location.search);
        const currentItem = {
            name: params.get('name'),
            price: params.get('price'),
            img: params.get('img')
        };

        if (currentItem.name && currentItem.img) {
            document.getElementById('p-name').innerText = currentItem.name;
            document.getElementById('p-price').innerText = currentItem.price;
            document.getElementById('main-img').src = currentItem.img;
            
            saveToRecent(currentItem);
        }

        function saveToRecent(item) {
            let recent = JSON.parse(localStorage.getItem('recentViewed')) || [];
            // Remove if already exists to move it to the front
            recent = recent.filter(r => r.name !== item.name);
            recent.unshift(item); // Add to start
            recent = recent.slice(0, 5); // Keep only last 5
            localStorage.setItem('recentViewed', JSON.stringify(recent));
        }

        function displayRecent() {
            const recent = JSON.parse(localStorage.getItem('recentViewed')) || [];
            const grid = document.getElementById('recent-grid');
            const section = document.getElementById('recent-viewed-section');

            // Don't show the current item in the recent list
            const others = recent.filter(r => r.name !== currentItem.name);

            if (others.length > 0) {
                section.style.display = 'block';
                others.forEach(item => {
                    grid.innerHTML += `
                        <a href="product-detail.html?name=${encodeURIComponent(item.name)}&price=${encodeURIComponent(item.price)}&img=${item.img}" class="recent-card">
                            <img src="${item.img}">
                            <p>${item.name}</p>
                        </a>`;
                });
            }
        }

        function toggleMenu() {
            const menu = document.getElementById("mobileMenu");
            menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
        }

        window.onload = displayRecent;
    </script>
</body>
</html>
