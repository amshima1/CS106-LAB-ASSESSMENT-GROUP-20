<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events | Onyx—Adire</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --onyx-red: #cc0000; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: #fff; overflow-x: hidden; }

        /* --- NAVIGATION & HEADER --- */
        .main-header { 
            position: fixed; top: 0; width: 100%; height: 80px;
            background: #fff; border-bottom: 1px solid #eee; z-index: 1000;
            display: flex; justify-content: center; align-items: center;
        }

        .brand-logo { font-family: 'Cinzel', serif; font-size: 1.5rem; letter-spacing: 5px; color: var(--onyx-red); }

        /* THE HAMBURGER BUTTON */
        .hamburger {
            position: absolute; left: 20px; width: 30px; height: 20px;
            display: flex; flex-direction: column; justify-content: space-between;
            cursor: pointer; z-index: 2000;
        }
        .hamburger span {
            display: block; height: 2px; width: 100%;
            background: var(--onyx-red); transition: 0.3s;
        }

        /* MORPH TO X */
        .hamburger.active span:nth-child(1) { transform: translateY(9px) rotate(45deg); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }

        /* THE ACTUAL SLIDE-OUT MENU */
        .side-nav {
            position: fixed; top: 0; left: -100%; width: 100%; height: 100vh;
            background: #ffffff; z-index: 1500; transition: 0.5s ease;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .side-nav.open { left: 0; } /* This makes it appear */

        .nav-links a {
            font-family: 'Cinzel', serif; font-size: 2rem; color: var(--onyx-red);
            text-decoration: none; margin: 15px 0; font-weight: 700; transition: 0.3s;
        }
        .nav-links a:hover { letter-spacing: 5px; }

        /* --- CONTENT --- */
        .content { padding: 120px 20px; max-width: 1100px; margin: 0 auto; text-align: center; }
        .event-section { margin-bottom: 80px; }
        .img-frame { 
            width: 100%; height: 70vh; background: #f9f9f9; 
            display: flex; align-items: center; justify-content: center; margin-bottom: 20px;
        }
        .img-frame img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        h2, h3, p { color: var(--onyx-red); }
        .event-tag { font-weight: 800; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; }

        /* --- FLOATING WHATSAPP --- */
        .whatsapp-float {
            position: fixed; bottom: 30px; right: 30px;
            background: #fff; color: var(--onyx-red); border: 2px solid var(--onyx-red);
            padding: 12px 20px; border-radius: 50px; text-decoration: none;
            font-weight: 800; font-size: 0.8rem; z-index: 1000;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="hamburger" id="nav-toggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="brand-logo">ONYX—ADIRE</div>
    </header>

    <nav class="side-nav" id="side-menu">
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="collection.html">Collection</a>
            <a href="trustees.html">Trustees</a>
            <a href="events.html">Events</a>
            <a href="contact.html">Inquiries</a>
        </div>
    </nav>

    <main class="content">
        <div class="event-section">
            <div class="img-frame"><img src="Onyx-Adire18.jpg" alt="Miva"></div>
            <span class="event-tag">Collaboration — 2026</span>
            <h3>Miva Open University Summit</h3>
        </div>

        <div class="event-section">
            <div class="img-frame"><img src="Onyx-Adire10.jpg" alt="Gala"></div>
            <span class="event-tag">January 2026</span>
            <h3>The Trustees Gala</h3>
        </div>

        <div class="event-section">
            <div class="img-frame"><img src="Onyx-Adire7.jpg" alt="Workshop"></div>
            <span class="event-tag">February 2026</span>
            <h3>Indigo Masterclass</h3>
        </div>
    </main>

    <a href="https://wa.me/234XXXXXXXXXX" class="whatsapp-float">
        <i class="fab fa-whatsapp"></i> CHAT WITH ONYX
    </a>

    <script>
        const navToggle = document.getElementById('nav-toggle');
        const sideMenu = document.getElementById('side-menu');

        navToggle.addEventListener('click', () => {
            navToggle.classList.toggle('active'); // Morphs the lines to X
            sideMenu.classList.toggle('open');    // Slides the menu into view
        });

        // Close menu when a link is clicked
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                navToggle.classList.remove('active');
                sideMenu.classList.remove('open');
            });
        });
    </script>
</body>
</html>
