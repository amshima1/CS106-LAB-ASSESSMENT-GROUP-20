<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Onyx—Adire</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: white;
      color: black;
    }

    /* Announcement bar */
    .announcement {
      background: red;
      color: white;
      padding: 10px;
      text-align: center;
      font-weight: bold;
      overflow: hidden;
      white-space: nowrap;
      animation: scrollText 15s linear infinite;
    }
    @keyframes scrollText {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    /* Header with logo and hamburger */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: white;
      padding: 15px;
      border-bottom: 2px solid red;
      position: relative;
    }
    .logo {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }
    .logo img {
      height: 50px;
    }
    .hamburger {
      font-size: 28px;
      cursor: pointer;
      color: red;
    }

    /* Sidebar menu */
    .sidebar {
      height: 100%;
      width: 0;
      position: fixed;
      top: 0;
      left: 0;
      background: red;
      overflow-x: hidden;
      transition: 0.3s;
      padding-top: 60px;
    }
    .sidebar a {
      padding: 10px 20px;
      text-decoration: none;
      font-size: 20px;
      color: white;
      display: block;
    }
    .sidebar a:hover {
      background: white;
      color: red;
    }
    .closebtn {
      position: absolute;
      top: 20px;
      right: 25px;
      font-size: 30px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Announcement bar -->
  <div class="announcement">
    Welcome to Onyx—Adire | Authentic Adire Fashion | New Collection Out Now!
  </div>

  <!-- Header -->
  <header>
    <span class="hamburger" onclick="openNav()">☰</span>
    <div class="logo">
      <img src="https://via.placeholder.com/150x50?text=Onyx-Adire" alt="Onyx-Adire Logo">
    </div>
  </header>

  <!-- Sidebar menu -->
  <div id="mySidebar" class="sidebar">
    <span class="closebtn" onclick="closeNav()">×</span>
    <a href="#">Home</a>
    <a href="#">Collections</a>
    <a href="#">Trustee</a>
    <a href="#">Events</a>
    <a href="#">Inquiries</a>
  </div>

  <script>
    function openNav() {
      document.getElementById("mySidebar").style.width = "250px";
    }
    function closeNav() {
      document.getElementById("mySidebar").style.width = "0";
    }
  </script>

</body>
</html>
