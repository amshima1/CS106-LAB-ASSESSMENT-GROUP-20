<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onyx—Adire | Official Home</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* 1. HERO SLIDER SYSTEM - UPDATED FOR FULL BODY VIEW */
        .white-border-frame {
            position: relative;
            width: 100%;
            height: 600px; /* Increased height to better accommodate full-body shots */
            overflow: hidden;
            border: 15px solid #ffffff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: #f4f4f4; /* Subtle background for areas the photo doesn't fill */
        }

        .hero-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* CHANGE: 'contain' ensures head-to-toe visibility */
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            z-index: 1;
        }

        .hero-slide.active {
            opacity: 1;
            z-index: 2;
        }

        /* 2. PERMANENT WHATSAPP BUTTON */
        .whatsapp-btn { 
            display: flex !important; 
            opacity: 1 !important; 
            pointer-events: auto !important; 
            animation: pulse-ring 2s infinite; 
            z-index: 10001; 
            position: fixed;
            bottom: 25px;
            right: 20px;
            background: #ffffff;
            padding: 12px 24px;
            border-radius: 50px;
            text-decoration: none;
            border: 2px solid #cc0000;
            font-weight: 800;
            font-size: 0.8rem;
            color: #cc0000;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            align-items: center;
            gap: 8px;
        }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(204, 0, 0, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(204, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(204, 0, 0, 0); }
        }

        /* 3. RECENTLY VIEWED SCROLL */
        .horizontal-scroll { 
            display: flex; 
            overflow-x: auto; 
            gap: 15px; 
            padding: 20px; 
            scrollbar-width: none; 
        }
        .horizontal-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="announcement-bar">
        <marquee scrollamount="5">ONYX—ADIRE: TRADITIONAL CRAFT MEETS TECHNICAL PRECISION.</marquee>
    </div>

    <header class="main-header">
        <div class="header-inner">
            <div class="hamburger" id="nav-open">
                <span></span><span></span><span></span>
            </div>
            <h1 class="brand-logo">ONYX—ADIRE</h1>
            <div class="header-spacer"></div>
        </div>
    </header>

    <nav id="side-menu" class="side-nav">
        <span id="nav-close">&times;</span>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="collection.html">Collection</a>
            <a href="trustees.html">Trustees</a>
            <a href="events.html">Events</a>
            <a href="inquiries.html">Inquiries</a>

        </div>
    </nav>

    <div id="lightbox" class="lightbox">
        <span class="close-lightbox">&times;</span>
        <div class="lightbox-main-content">
            <img class="lightbox-img" src="" alt="Onyx Selection">
            <div class="lightbox-caption"></div>
        </div>
        <div class="suggestions-container" style="width:100%; max-width:450px; margin:20px auto; border-top:1px solid #eee; padding-top:20px; text-align:center;">
            <h4 style="font-size:0.6rem; letter-spacing:2px; margin-bottom:15px; color:#cc0000; font-weight:800;">YOU MAY ALSO LIKE</h4>
            <div id="suggestion-row" style="display:flex; justify-content:center; gap:10px;"></div>
        </div>
    </div>

    <main class="main-content">
        <section class="hero-frame-container">
            <div class="white-border-frame" id="hero-slider">
                <div class="hero-slide active" style="background-image: url('Onyx-Adire10.jpg');"></div>
                <div class="hero-slide" style="background-image: url('Onyx-Adire18.jpg');"></div>
                <div class="hero-slide" style="background-image: url('Onyx-Adire39.jpg');"></div>
            </div>
        </section>

        <section class="collection-area">
            <h2 class="section-title">THE FULL COLLECTION</h2>
            <div class="grid-container" id="main-grid"></div>
        </section>

        <section class="extra-section" id="recent-section" style="display:none; border-top:1px solid #eee; margin-top:40px; padding-bottom:40px;">
            <h2 class="section-title">RECENTLY VIEWED</h2>
            <div class="horizontal-scroll" id="recent-view-container"></div>
        </section>
    </main>

    <footer class="footer-red" style="background:#cc0000; padding:60px 20px; text-align:center;">
        <p style="color:#ffffff; font-size:0.65rem; font-weight:700;">&copy; 2026 ONYX—ADIRE. ALL RIGHTS RESERVED.</p>
    </footer>

    <a href="https://wa.me/2347077978701" class="whatsapp-btn">
        <i class="fab fa-whatsapp"></i> Chat with Onyx
    </a>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('main-grid');
            const slides = document.querySelectorAll('.hero-slide');
            const sugRow = document.getElementById('suggestion-row');
            const recentContainer = document.getElementById('recent-view-container');
            const recentSection = document.getElementById('recent-section');
            let currentSlide = 0;

            // 1. HERO SLIDER AUTO-PLAY
            setInterval(() => {
                slides[currentSlide].classList.remove('active');
                currentSlide = (currentSlide + 1) % slides.length;
                slides[currentSlide].classList.add('active');
            }, 4000);

            // 2. GENERATE GRID (1-47)
            let items = '';
            for (let i = 1; i <= 47; i++) {
                items += `
                <div class="grid-item">
                    <img src="Onyx-Adire${i}.jpg" class="clickable-img" data-name="Onyx ${i}" loading="lazy">
                    <div class="product-info"><h3>Onyx ${i}</h3><p>₦25,000</p></div>
                </div>`;
            }
            grid.innerHTML = items;

            // 3. HISTORY & SUGGESTIONS LOGIC
            let history = JSON.parse(localStorage.getItem('onyx_history')) || [];
            
            function updateRecentUI() {
                if (history.length > 0) {
                    recentSection.style.display = 'block';
                    recentContainer.innerHTML = history.map(item => `
                        <div class="grid-item" style="min-width:140px; text-align:center;">
                            <img src="${item.src}" class="clickable-img" data-name="${item.name}" style="width:100%; height:auto;">
                            <p style="font-size:0.6rem; font-weight:800; margin-top:5px; color:#cc0000;">${item.name}</p>
                        </div>
                    `).join('');
                }
            }

            function showSuggestions(currentSrc) {
                sugRow.innerHTML = '';
                let pool = [];
                for(let i=1; i<=47; i++) { if(!currentSrc.includes(`Onyx-Adire${i}.jpg`)) pool.push(i); }
                pool.sort(() => 0.5 - Math.random()).slice(0, 4).forEach(num => {
                    const div = document.createElement('div');
                    div.style.width = '70px';
                    div.innerHTML = `<img src="Onyx-Adire${num}.jpg" class="clickable-img" data-name="Onyx ${num}" style="width:100%; height:80px; object-fit:cover; border:1px solid #eee; cursor:pointer;">`;
                    sugRow.appendChild(div);
                });
            }

            // 4. GLOBAL CLICK HANDLER
            document.addEventListener('click', (e) => {
                if (e.target.classList.contains('clickable-img')) {
                    const src = e.target.src;
                    const name = e.target.getAttribute('data-name');
                    document.getElementById('lightbox').style.display = 'flex';
                    document.querySelector('.lightbox-img').src = src;
                    document.querySelector('.lightbox-caption').innerText = name;
                    document.body.style.overflow = 'hidden';
                    
                    showSuggestions(src);
                    
                    // History Update
                    history = history.filter(h => h.src !== src);
                    history.unshift({src, name});
                    if (history.length > 8) history.pop();
                    localStorage.setItem('onyx_history', JSON.stringify(history));
                    updateRecentUI();
                }
                if (e.target.classList.contains('close-lightbox') || e.target === document.getElementById('lightbox')) {
                    document.getElementById('lightbox').style.display = 'none';
                    document.body.style.overflow = 'auto';
                }
            });

            updateRecentUI();
        });
    </script>
</body>
</html>
