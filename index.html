<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onyx—Adire | Official Home</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* HERO SLIDER STYLE */
        .white-border-frame {
            position: relative; width: 100%; height: 500px; overflow: hidden;
            border: 15px solid #ffffff; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .hero-slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center; opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }
        .hero-slide.active { opacity: 1; z-index: 2; }

        /* WHATSAPP PULSE */
        .whatsapp-btn { 
            display: flex !important; opacity: 1 !important; pointer-events: auto !important; 
            animation: pulse-ring 2s infinite; z-index: 10001; 
            position: fixed; bottom: 25px; right: 20px; background: #fff;
            padding: 12px 24px; border-radius: 50px; text-decoration: none;
            border: 2px solid #cc0000; font-weight: 800; font-size: 0.8rem;
            color: #cc0000; box-shadow: 0 8px 20px rgba(0,0,0,0.1); align-items: center; gap: 8px;
        }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(204, 0, 0, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(204, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(204, 0, 0, 0); }
        }
        .horizontal-scroll { display: flex; overflow-x: auto; gap: 15px; padding: 20px; scrollbar-width: none; }
        .horizontal-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="announcement-bar"><marquee>ONYX—ADIRE: TRADITIONAL CRAFT MEETS TECHNICAL PRECISION.</marquee></div>

    <header class="main-header">
        <div class="header-inner">
            <div class="hamburger" id="nav-open"><span></span><span></span><span></span></div>
            <h1 class="brand-logo">ONYX—ADIRE</h1>
            <div class="header-spacer"></div>
        </div>
    </header>

    <nav id="side-menu" class="side-nav">
        <span id="nav-close">&times;</span>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="collection.html">Collection</a>
            <a href="trustees.html">Trustees</a>
            <a href="events.html">Events</a>
            <a href="contact.html">Inquiries</a>
        </div>
    </nav>

    <div id="lightbox" class="lightbox">
        <span class="close-lightbox">&times;</span>
        <div class="lightbox-main-content">
            <img class="lightbox-img" src="">
            <div class="lightbox-caption"></div>
        </div>
        <div class="suggestions-container" style="width:100%; max-width:450px; margin:20px auto; border-top:1px solid #eee; padding-top:20px; text-align:center;">
            <h4 style="font-size:0.6rem; color:#cc0000; font-weight:800;">YOU MAY ALSO LIKE</h4>
            <div id="suggestion-row" style="display:flex; justify-content:center; gap:10px;"></div>
        </div>
    </div>

    <main class="main-content">
        <section class="hero-frame-container">
            <div class="white-border-frame" id="hero-slider">
                <div class="hero-slide active" style="background-image: url('Onyx-Adire10.jpg');"></div>
                <div class="hero-slide" style="background-image: url('Onyx-Adire18.jpg');"></div>
                <div class="hero-slide" style="background-image: url('Onyx-Adire39.jpg');"></div>
            </div>
        </section>

        <section class="collection-area">
            <h2 class="section-title">THE FULL COLLECTION</h2>
            <div class="grid-container" id="main-grid"></div>
        </section>

        <section class="extra-section" id="recent-section" style="display:none; border-top:1px solid #eee; margin-top:40px;">
            <h2 class="section-title">RECENTLY VIEWED</h2>
            <div class="horizontal-scroll" id="recent-view-container"></div>
        </section>
    </main>

    <footer class="footer-red" style="background:#cc0000; padding:60px 20px; text-align:center;">
        <p style="color:#fff; font-size:0.65rem;">&copy; 2026 ONYX—ADIRE. ALL RIGHTS RESERVED.</p>
    </footer>

    <a href="https://wa.me/234XXXXXXXXXX" class="whatsapp-btn"><i class="fab fa-whatsapp"></i> Chat with Onyx</a>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('main-grid');
            const slides = document.querySelectorAll('.hero-slide');
            let currentS = 0;

            // Slider Logic
            setInterval(() => {
                slides[currentS].classList.remove('active');
                currentS = (currentS + 1) % slides.length;
                slides[currentS].classList.add('active');
            }, 4000);

            // Grid Logic
            let items = '';
            for (let i = 1; i <= 47; i++) {
                items += `<div class="grid-item"><img src="Onyx-Adire${i}.jpg" class="clickable-img" data-name="Onyx ${i}" loading="lazy"><div class="product-info"><h3>Onyx ${i}</h3><p>₦25,000</p></div></div>`;
            }
            grid.innerHTML = items;

            // Global Click Logic (Suggestions/History)
            document.addEventListener('click', (e) => {
                if (e.target.classList.contains('clickable-img')) {
                    const src = e.target.src;
                    const name = e.target.getAttribute('data-name');
                    document.getElementById('lightbox').style.display = 'flex';
                    document.querySelector('.lightbox-img').src = src;
                    document.querySelector('.lightbox-caption').innerText = name;
                    
                    // History/Suggestions call here (referencing script.js or internal)
                }
                if (e.target.classList.contains('close-lightbox')) {
                    document.getElementById('lightbox').style.display = 'none';
                    document.body.style.overflow = 'auto';
                }
            });
        });
    </script>
</body>
</html>
