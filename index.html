<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onyx—Adire | Official Home</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Permanent Visible State with Pulse */
        .whatsapp-btn { 
            opacity: 1 !important; 
            transform: translateY(0) !important; 
            pointer-events: auto !important; 
            display: flex;
            align-items: center;
            gap: 8px;
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(204, 0, 0, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(204, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(204, 0, 0, 0); }
        }
    </style>
</head>
<body>
    <div class="announcement-bar">
        <marquee scrollamount="5">ONYX—ADIRE: TRADITIONAL CRAFT MEETS TECHNICAL PRECISION.</marquee>
    </div>

    <header class="main-header">
        <div class="header-inner">
            <div class="hamburger" id="nav-open"><span></span><span></span><span></span></div>
            <h1 class="brand-logo">ONYX—ADIRE</h1>
        </div>
    </header>

    <nav id="side-menu" class="side-nav">
        <span id="nav-close">&times;</span>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="collection.html">Collection</a>
            <a href="trustees.html">Trustees</a>
            <a href="events.html">Events</a>
            <a href="contact.html">Inquiries</a>
        </div>
    </nav>

    <main class="main-content">
        <section class="hero-frame-container">
            <div class="white-border-frame">
                <div class="slide" style="background-image: url('Onyx-Adire10.jpg');"></div>
                <div class="slide" style="background-image: url('Onyx-Adire18.jpg');"></div>
                <div class="slide" style="background-image: url('Onyx-Adire39.jpg');"></div>
            </div>
        </section>

        <section class="collection-area">
            <h2 class="section-title">THE FULL COLLECTION</h2>
            <div class="grid-container" id="main-grid"></div>
        </section>
    </main>

    <a href="https://wa.me/234XXXXXXXXXX?text=Hello%20Onyx-Adire!" class="whatsapp-btn" id="wa-btn">
        <i class="fab fa-whatsapp"></i> Chat with Onyx
    </a>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('main-grid');
            if (grid) {
                let items = '';
                for (let i = 1; i <= 47; i++) {
                    items += `<div class="grid-item">
                        <img src="Onyx-Adire${i}.jpg" class="clickable-img" data-name="Onyx ${i}" onclick="openLightbox('Onyx-Adire${i}.jpg', 'Onyx ${i}')" loading="lazy">
                        <div class="product-info"><h3>Onyx ${i}</h3><p>₦25,000</p></div>
                    </div>`;
                }
                grid.innerHTML = items;
            }
        });
    </script>
</body>
</html>
