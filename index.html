<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onyx-Adire | Haute Couture</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@700&family=Montserrat:wght@400;600&display=swap');

        :root {
            --brand-red: #b31d24;
            --onyx-black: #111111;
            --header-height: 105px; /* Total height of bar + logo area */
        }

        body { margin: 0; font-family: 'Montserrat', sans-serif; background: #fff; }

        /* 1. THE MASTER HEADER (STRONGLY FIXED) */
        .master-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            z-index: 9999; /* Highest priority on the page */
            background: white;
            display: flex;
            flex-direction: column;
        }

        /* FIXED ANNOUNCEMENT BAR */
        .promo-bar {
            background-color: var(--brand-red);
            color: white;
            height: 35px;
            display: flex;
            align-items: center;
            overflow: hidden; /* Important for marquee */
            position: relative;
        }

        .marquee-text {
            position: absolute;
            white-space: nowrap;
            will-change: transform;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: scrolling 15s linear infinite;
        }

        @keyframes scrolling {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        /* LOGO AREA */
        header {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #eee;
            position: relative;
            background: white;
        }

        .hamburger {
            position: absolute;
            left: 20px;
            font-size: 28px;
            cursor: pointer;
            color: var(--onyx-black);
            z-index: 10000;
        }

        .logo {
            font-family: 'Bodoni Moda', serif;
            font-size: 24px;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--onyx-black);
            letter-spacing: 4px;
        }

        /* 2. SIDE MENU (STARTS BELOW HEADER) */
        .side-menu {
            height: calc(100vh - var(--header-height));
            width: 0;
            position: fixed;
            z-index: 9000; 
            top: var(--header-height); /* Starts exactly under the logo */
            left: 0;
            background-color: white;
            overflow-x: hidden;
            transition: 0.4s ease;
            box-shadow: 5px 0 15px rgba(0,0,0,0.05);
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 26px;
            cursor: pointer;
        }

        .menu-links { padding-top: 40px; }
        .menu-links a {
            padding: 15px 40px;
            display: block;
            font-family: 'Bodoni Moda', serif;
            font-size: 18px;
            text-decoration: none;
            color: var(--onyx-black);
            text-transform: uppercase;
        }

        /* 3. MAIN CONTENT (PUSHED DOWN BY HEADER) */
        .page-content {
            margin-top: var(--header-height);
            padding-bottom: 100px;
        }

        .hero-img { width: 100%; height: auto; display: block; }

        /* 4. WHATSAPP (STAYS ON TOP) */
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 20px;
            background-color: var(--brand-red);
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            z-index: 9998; 
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="master-header">
        <div class="promo-bar">
            <div class="marquee-text">ONYX-ADIRE • LUXURY HERITAGE • WORLDWIDE SHIPPING • SHOP THE DEBUT EDIT •</div>
        </div>
        <header>
            <div class="hamburger" id="hamBtn" onclick="toggleNav()">☰</div>
            <a href="#" class="logo">Onyx-Adire</a>
        </header>
    </div>

    <div id="mySideMenu" class="side-menu">
        <span class="close-btn" onclick="toggleNav()">✕</span>
        <div class="menu-links">
            <a href="#" onclick="toggleNav()">Home</a>
            <a href="#" onclick="toggleNav()">Collection</a>
            <a href="#" onclick="toggleNav()">Trustees</a>
            <a href="#" onclick="toggleNav()">Events</a>
            <a href="#" onclick="toggleNav()">Inquiries</a>
        </div>
    </div>

    <div class="page-content">
        <img src="Onyx-Adire18.jpg" class="hero-img">
        <h1 style="text-align: center; font-family: 'Bodoni Moda'; padding: 40px 0; letter-spacing: 5px;">THE DEBUT EDIT</h1>
        </div>

    <a href="https://wa.me/2347077978701" class="whatsapp-float">
        <i class="fab fa-whatsapp"></i> Chat via WhatsApp
    </a>

    <script>
        function toggleNav() {
            var menu = document.getElementById("mySideMenu");
            var ham = document.getElementById("hamBtn");
            
            if (menu.style.width === "280px") {
                menu.style.width = "0";
            } else {
                menu.style.width = "280px";
            }
        }
    </script>

</body>
</html>
