<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onyx—Adire | Official Home</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="announcement-bar">
        <marquee scrollamount="5">ONYX—ADIRE: TRADITIONAL CRAFT MEETS TECHNICAL PRECISION.</marquee>
    </div>

    <header class="main-header">
        <div class="header-inner">
            <div class="hamburger" id="nav-open">
                <span></span><span></span><span></span>
            </div>
            <h1 class="brand-logo">ONYX—ADIRE</h1>
            <div class="header-spacer"></div>
        </div>
    </header>

    <nav id="side-menu" class="side-nav">
        <span id="nav-close">&times;</span>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="product.html">Collection</a>
            <a href="trustees.html">Trustees</a>
            <a href="events.html">Events</a>
            <a href="contact.html">Inquiries</a>
        </div>
    </nav>

    <div id="lightbox" class="lightbox">
        <span class="close-lightbox">&times;</span>
        <div class="lightbox-main-content">
            <img class="lightbox-img" src="" alt="Onyx Gallery">
            <div class="lightbox-caption"></div>
        </div>
        <div class="suggestions-container">
            <h4 class="suggestion-title">YOU MAY ALSO LIKE</h4>
            <div id="suggestion-row" class="suggestion-grid">
                </div>
        </div>
    </div>

    <main class="main-content">
        <section class="hero-frame-container">
            <div class="white-border-frame">
                <div class="slide" style="background-image: url('Onyx-Adire10.jpg');"></div>
                <div class="slide" style="background-image: url('Onyx-Adire18.jpg');"></div>
                <div class="slide" style="background-image: url('Onyx-Adire39.jpg');"></div>
            </div>
        </section>

        <section class="collection-area">
            <h2 class="section-title">THE FULL COLLECTION</h2>
            <div class="grid-container" id="main-grid">
                </div>
        </section>

        <section class="extra-section" id="recent-section" style="display:none;">
            <h2 class="section-title">RECENTLY VIEWED</h2>
            <div class="horizontal-scroll" id="recent-view-container"></div>
        </section>
    </main>

    <footer class="footer-red">
        <p>&copy; 2026 ONYX—ADIRE. ALL RIGHTS RESERVED.</p>
    </footer>

    <a href="https://wa.me/234XXXXXXXXXX" class="whatsapp-btn">
        <i class="fab fa-whatsapp"></i> Chat with Onyx
    </a>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('main-grid');
            if (grid) {
                let items = '';
                for (let i = 1; i <= 47; i++) {
                    items += `
                        <div class="grid-item">
                            <img src="Onyx-Adire${i}.jpg" class="clickable-img" data-name="Onyx ${i}" loading="lazy">
                            <div class="product-info">
                                <h3>Onyx ${i}</h3>
                                <p>₦25,000</p>
                            </div>
                        </div>
                    `;
                }
                grid.innerHTML = items;
            }
        });
    </script>

    <script src="script.js"></script>
</body>
</html>
