<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onyx-Adire | The Debut Edit</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap');

        :root {
            --brand-red: #b31d24;
            --onyx-black: #111111;
            --glass-white: rgba(255, 255, 255, 0.98);
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #fff;
            overflow-x: hidden;
        }

        /* 1. WORKING ANNOUNCEMENT BAR */
        .promo-bar {
            background-color: var(--brand-red);
            color: white;
            padding: 12px 0;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            overflow: hidden;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 3000;
        }

        .marquee {
            display: inline-block;
            animation: marquee 20s linear infinite;
            padding-left: 100%;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* 2. NAVIGATION & LOGO */
        header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 5%;
            background: white;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 35px;
            z-index: 2000;
        }

        .hamburger {
            position: absolute;
            left: 5%;
            font-size: 30px;
            cursor: pointer;
            z-index: 3500;
        }

        .logo {
            font-family: 'Bodoni Moda', serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--onyx-black);
        }

        /* 3. WORKING SIDE MENU */
        .side-menu {
            height: 100vh;
            width: 0;
            position: fixed;
            z-index: 2500;
            top: 0;
            left: 0;
            background-color: var(--glass-white);
            overflow-x: hidden;
            transition: 0.5s;
            padding-top: 150px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
        }

        .side-menu a {
            padding: 15px 40px;
            text-decoration: none;
            font-size: 22px;
            color: var(--onyx-black);
            font-family: 'Bodoni Moda', serif;
            display: block;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .side-menu a:hover { color: var(--brand-red); }

        /* 4. HERO & COLLECTION */
        .hero-section { width: 100%; text-align: center; }
        .hero-image { width: 100%; height: auto; display: block; }

        .debut-header {
            text-align: center;
            padding: 60px 20px 20px;
            font-family: 'Bodoni Moda', serif;
            font-size: 40px;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        .collection-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .collection-item {
            text-align: center;
            margin-bottom: 30px;
        }

        .collection-item img {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 15px;
        }

        .item-price {
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            font-size: 16px;
            color: var(--onyx-black);
            letter-spacing: 1px;
        }

        /* 5. RED FOOTER & NEWSLETTER */
        footer {
            background-color: var(--brand-red);
            color: white;
            text-align: center;
            padding: 80px 20px;
            margin-top: 50px;
        }

        .footer-title {
            font-family: 'Bodoni Moda', serif;
            font-size: 28px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .newsletter-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid white;
            color: white;
            padding: 10px;
            width: 280px;
            margin-bottom: 30px;
            outline: none;
            text-align: center;
            font-family: 'Montserrat', sans-serif;
        }

        .social-links {
            margin-top: 20px;
        }

        .social-links a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* 6. FLOATING RED WHATSAPP */
        .whatsapp-float {
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 30px;
            right: 30px;
            background-color: var(--brand-red);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 30px;
            z-index: 4000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="promo-bar">
        <div class="marquee">
            ONYX-ADIRE HERITAGE DROP • WORLDWIDE LUXURY SHIPPING • SHOP THE DEBUT EDIT NOW • 
        </div>
    </div>

    <header>
        <div class="hamburger" onclick="toggleMenu()">☰</div>
        <a href="#" class="logo">Onyx-Adire</a>
    </header>

    <div id="mySideMenu" class="side-menu">
        <a href="#">Home</a>
        <a href="#">Collection</a>
        <a href="#">Trustees</a>
        <a href="#">Events</a>
        <a href="#">Inquiries</a>
    </div>

    <section class="hero-section">
        <img src="Onyx-Adire18.jpg" alt="Onyx-Adire Full View" class="hero-image">
    </section>

    <h1 class="debut-header">THE DEBUT EDIT</h1>

    <div class="collection-grid">
        <script>
            // Sample price – you can update the numbers in the array to be specific
            const prices = ["₦45,000", "₦52,000", "₦38,500", "₦60,000", "₦42,000", "₦55,000", "₦48,000", "₦65,000", "₦35,000", "₦50,000", "₦58,000", "₦44,500", "₦62,000", "₦39,000", "₦51,000", "₦70,000"];

            for (let i = 1; i <= 16; i++) {
                document.write(`
                    <div class="collection-item">
                        <img src="Onyx-Adire${i}.jpg" alt="Collection Piece ${i}">
                        <div class="item-price">${prices[i-1]}</div>
                    </div>
                `);
            }
        </script>
    </div>

    <footer>
        <h2 class="footer-title">Subscribe to our newsletter</h2>
        <input type="email" placeholder="YOUR EMAIL ADDRESS" class="newsletter-input"><br>
        <div class="social-links">
            <a href="https://instagram.com/onyx_adire" target="_blank">Instagram</a>
            <a href="https://tiktok.com/@onyx_adire" target="_blank">Tiktok</a>
        </div>
    </footer>

    <a href="https://wa.me/2340000000000" class="whatsapp-float">
        <svg width="30" height="30" fill="currentColor" viewBox="0 0 16 16"><path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326z"/></svg>
    </a>

    <script>
        function toggleMenu() {
            var menu = document.getElementById("mySideMenu");
            if (menu.style.width === "280px") {
                menu.style.width = "0";
            } else {
                menu.style.width = "280px";
            }
        }
    </script>

</body>
</html>
