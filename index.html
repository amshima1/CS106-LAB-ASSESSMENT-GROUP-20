<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Onyx—Adire</title>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: #fffcf9; color: #333; }
        
        /* Navigation - Standardized Across Pages */
        nav { 
            display: flex; align-items: center; justify-content: center; /* Centers the whole container */
            padding: 15px 25px; border-bottom: 1px solid #f4f4f4; position: relative; background: #fffcf9; 
        }
        .hamburger { 
            position: absolute; left: 20px; font-size: 28px; cursor: pointer; color: #800020; 
        }
        .logo { 
            text-decoration: none; color: #800020; font-family: 'Playfair Display', serif; 
            font-size: 26px; font-style: italic; /* Centered in the nav */
        }

        /* Home Page Banner - Matches */
        .banner { 
            width: 100%; height: 80vh; overflow: hidden; position: relative; margin-top: -1px; 
        }
        .banner img { 
            width: 100%; height: 100%; object-fit: cover; /* Centers and scales the large image */
        }
        .banner-text { 
            position: absolute; bottom: 40px; left: 30px; color: white; 
            text-shadow: 0 2px 15px rgba(0,0,0,0.4); 
        }
        .banner-text h1 { 
            font-family: 'Playfair Display', serif; font-size: 36px; font-style: italic; margin: 0; 
        }

        /* Collections Preview Grid - Matches */
        .section-title { 
            font-family: 'Playfair Display', serif; text-align: center; font-style: italic; 
            margin: 40px 0 20px; color: #800020; 
        }
        .grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 15px 40px; 
            max-width: 1200px; margin: 0 auto; 
        }
        .card { background: #fff; cursor: pointer; transition: transform 0.3s ease; border: 1px solid #eee; }
        .card img { width: 100%; height: 320px; object-fit: cover; }
        .meta { padding: 10px; text-align: left; }
        .meta h4 { 
            font-family: 'Playfair Display', serif; font-size: 13px; margin: 0; 
            font-style: italic; color: #800020; 
        }
        .meta p { font-size: 11px; font-weight: bold; margin: 5px 0; }

        /* Mobile Menu (Hamburger) */
        .menu-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 35vh; 
            background: #fffcf9; z-index: 1000000; flex-direction: column; padding: 30px 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03); animation: slideDown 0.3s ease-out; box-sizing: border-box;
        }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
        .menu-overlay a { margin: 8px 0; font-size: 13px; text-decoration: none; color: #800020; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 500; text-align: left; }
        .menu-tint { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 999999; }

        /* Floating WhatsApp Icon - Matches */
        .whatsapp-sticky { 
            position: fixed; bottom: 25px; right: 20px; background-color: #e85d43; color: white; 
            text-decoration: none; border-radius: 50px; padding: 12px 22px; display: flex; align-items: center; 
            z-index: 9999; font-size: 13px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } }
    </style>
</head>
<body>

    <nav>
        <div class="hamburger" onclick="toggleMenu()">&#9776;</div>
        <a href="index.html" class="logo">Onyx—Adire</a>
        <div id="menuTint" class="menu-tint" onclick="toggleMenu()"></div>
        <div id="mobileMenu" class="menu-overlay">
            <a href="index.html" style="font-weight: bold;">The Home</a>
            <a href="products.html">The Collection</a>
            <a href="visionaries.html">The Visionaries</a> 
            <a href="runway.html">The Runway</a> 
            <a href="bookings.html">The Atelier</a>
        </div>
    </nav>

    <div class="banner">
        <img src="19.png" alt="Onyx Adire Traditional Showcase">
        <div class="banner-text">
            <h1>Traditional Elegance.</h1>
        </div>
    </div>

    <h3 class="section-title">Collection Highlights</h3>
    <div class="grid" id="main-grid"></div>

    <script>
        // Data derived from and repository lists
        const highlights = [
            { name: "Galaxy Print Jumpsuit", price: "₦58,500.00", img: "13.png" },
            { name: "Sadiya Adire Long Dress", price: "₦55,000.00", img: "sadiya-adire-long-dress.jpg" },
            { name: "Floral Adire Kaftan", price: "₦52,000.00", img: "floral-adire-kaftan.jpg" },
            { name: "Bespoke Traditional Agbada", price: "₦95,000.00", img: "14.png" }
        ];

        function createCard(item) {
            return `<div class="card"><img src="${item.img}" onerror="this.src='https://via.placeholder.com/400x600?text=Onyx+Adire'"><div class="meta"><h4>${item.name}</h4><p>${item.price}</p></div></div>`;
        }

        function toggleMenu() {
            const m = document.getElementById("mobileMenu");
            const t = document.getElementById("menuTint");
            const isOpen = m.style.display === "flex";
            m.style.display = isOpen ? "none" : "flex";
            t.style.display = isOpen ? "none" : "block";
        }

        window.onload = function() {
            document.getElementById('main-grid').innerHTML = highlights.map(item => createCard(item)).join('');
        };
    </script>
</body>
</html>
