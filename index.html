<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onyx—Adire | Tradition Reimagined</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

    <div class="announcement-bar">
        <span>✦ TRADITION REIMAGINED ✦ THE ONYX—ADIRE</span>
    </div>

    <header>
        <div class="hamburger-icon" onclick="toggleMenu()">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
        </div>
        <div class="logo">Onyx—Adire</div>
    </header>

    <nav class="side-menu" id="sideMenu">
        <div class="close-area">
            <span class="close-icon" onclick="toggleMenu()">&times;</span>
        </div>
        
        <ul class="menu-links">
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="#collections">Collections</a></li>
            <li><a href="#trustees">Trustees</a></li>
            <li><a href="#events">Events</a></li>
            <li><a href="#bookings">Bookings</a></li>
            <li><a href="#inquiries">Inquiries</a></li>
        </ul>
    </nav>

    <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>

    <main>
        <section class="hero">
            <img src="your-hero-image.jpg" alt="Adire Fashion" style="width:100%; height:auto;">
        </section>
    </main>

    <a href="https://wa.me/yournumber" class="whatsapp-float" target="_blank">
        <span class="whatsapp-icon">💬</span>
        <span>Chat Via Whatsapp</span>
    </a>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('sideMenu');
            const overlay = document.getElementById('menuOverlay');
            
            // Toggle the 'active' class on both the menu and the background dimming overlay
            menu.classList.toggle('active');
            overlay.classList.toggle('active');
            
            // Optional: Prevent background scrolling when menu is open
            if (menu.classList.contains('active')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = 'auto';
            }
        }
    </script>

</body>
</html>
