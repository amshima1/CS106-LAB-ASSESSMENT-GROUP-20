<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onyx-Adire | Haute Couture</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap');

        :root {
            --brand-red: #b31d24;
            --onyx-black: #111111;
            --glass-white: rgba(255, 255, 255, 0.95);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #000;
        }

        /* 1. TOP SECTION (Always on Top) */
        .fixed-header-container {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 2000; /* Highest priority */
        }

        .promo-bar {
            background-color: var(--brand-red);
            color: white;
            padding: 12px 0;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            overflow: hidden;
            white-space: nowrap;
        }

        .marquee {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 25s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 5%;
            background: var(--glass-white);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.1);
            position: relative;
        }

        .hamburger {
            position: absolute;
            left: 5%;
            font-size: 28px;
            cursor: pointer;
            color: var(--onyx-black);
        }

        .logo {
            font-family: 'Bodoni Moda', serif;
            font-size: clamp(24px, 5vw, 36px);
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--onyx-black);
            text-decoration: none;
            text-transform: uppercase;
        }

        /* 2. SIDEBAR MENU (Stops at middle of screen) */
        .side-menu {
            height: calc(100% - 110px); /* Adjusts to stay below header */
            width: 0;
            position: fixed;
            z-index: 1500;
            top: 110px; /* Starts exactly where header ends */
            left: 0;
            background-color: var(--glass-white);
            overflow-x: hidden;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 10px 0 30px rgba(0,0,0,0.05);
        }

        .menu-content {
            width: 300px; /* Width of the drawer */
            padding-top: 60px;
            display: flex;
            flex-direction: column;
            padding-left: 10%;
        }

        .menu-content a {
            padding: 15px 0;
            text-decoration: none;
            font-size: 20px;
            color: var(--onyx-black);
            font-family: 'Bodoni Moda', serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            border-bottom: 1px solid transparent;
            width: fit-content;
        }

        .menu-content a:hover {
            color: var(--brand-red);
            padding-left: 10px;
        }

        /* 3. FULL HERO IMAGE */
        .hero-container {
            width: 100%;
            height: 100vh; /* Full viewport height */
            position: relative;
            padding-top: 0;
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures "full" look without distortion */
            display: block;
        }

        /* 4. FLOATING RED WHATSAPP (Always on Top) */
        .whatsapp-float {
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 40px;
            right: 40px;
            background-color: var(--brand-red);
            color: #FFF;
            border-radius: 50px;
            text-align: center;
            font-size: 30px;
            box-shadow: 2px 2px 15px rgba(0,0,0,0.3);
            z-index: 2500; /* Higher than everything */
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: transform 0.3s ease;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            .menu-content { width: 250px; }
            .whatsapp-float { bottom: 20px; right: 20px; width: 50px; height: 50px; }
        }
    </style>
</head>
<body>

    <div class="fixed-header-container">
        <div class="promo-bar">
            <div class="marquee">
                ONYX-ADIRE HERITAGE COLLECTION • TRADITION REIMAGINED • WORLDWIDE LUXURY DELIVERY • 
            </div>
        </div>
        <nav>
            <div class="hamburger" id="menuBtn" onclick="toggleNav()">☰</div>
            <a href="#" class="logo">Onyx-Adire</a>
        </nav>
    </div>

    <div id="mySideMenu" class="side-menu">
        <div class="menu-content">
            <a href="#">Home</a>
            <a href="#">Collection</a>
            <a href="#">Trustees</a>
            <a href="#">Events</a>
            <a href="#">Inquiries</a>
        </div>
    </div>

    <div class="hero-container">
        <img src="Onyx-Adire18.jpg" alt="Onyx-Adire Collection" class="hero-image">
    </div>

    <a href="https://wa.me/YOURNUMBER" class="whatsapp-float" target="_blank">
        <svg width="30" height="30" fill="currentColor" viewBox="0 0 16 16">
            <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
        </svg>
    </a>

    <script>
        function toggleNav() {
            var menu = document.getElementById("mySideMenu");
            var btn = document.getElementById("menuBtn");
            if (menu.style.width === "300px") {
                menu.style.width = "0";
                btn.innerHTML = "☰";
            } else {
                menu.style.width = "300px";
                btn.innerHTML = "✕";
            }
        }
    </script>

</body>
</html>
