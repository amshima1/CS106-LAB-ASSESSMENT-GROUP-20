<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onyx—Adire | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-red: #8B1D1D;
            --bg-cream: #FFFBF7;
            --whatsapp-orange: #E65137; 
            --text-dark: #333333;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-cream);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: var(--brand-red);
            text-align: center;
            overflow-x: hidden;
        }

        /* --- HEADER & ANNOUNCEMENT (TOP LAYER: 20000) --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 20000; 
            background: var(--bg-cream);
        }

        .announcement-bar {
            background-color: var(--brand-red);
            color: white;
            padding: 10px 0;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            overflow: hidden;
            white-space: nowrap;
        }

        .announcement-text {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 15s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(139, 29, 29, 0.1);
            background: var(--bg-cream);
        }

        .menu-icon { width: 30px; cursor: pointer; position: relative; z-index: 21000; }
        .menu-icon div { height: 2px; width: 25px; background-color: var(--brand-red); margin: 6px 0; }

        .logo { 
            font-family: 'Playfair Display', serif; 
            font-size: 24px; 
            font-style: italic; 
            font-weight: 700; 
            text-decoration: none; 
            color: var(--brand-red);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            z-index: 21000;
        }

        /* --- SIDENAV (MIDDLE LAYER: 15000) --- */
        #mySidenav {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 15000; 
            top: 0; left: 0;
            background-color: var(--bg-cream);
            overflow-x: hidden;
            transition: 0.4s ease-in-out;
            padding-top: 140px; /* Starts below logo area */
            text-align: left;
        }

        #mySidenav a {
            padding: 15px 32px;
            text-decoration: none;
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: var(--brand-red);
            display: block;
            font-style: italic;
        }

        #overlay {
            display: none;
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            background: rgba(0,0,0,0.4);
            z-index: 14000; 
        }

            bottom: 25px;
            right: 20px;

            color: white;
            padding: 12px 22px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
